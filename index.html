function App() {
  const [agentKey, setAgentKey] = useState(null);
  const [tab, setTab] = useState("roadmap");
  const [jt, setJt] = useState("buyer");
  const [bPhase, setBPhase] = useState(4);
  const [sPhase, setSPhase] = useState(3);
  const [contacts, setContacts] = useState(null);
  const [msgs, setMsgs] = useState(null);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const msgEnd = useRef(null);

  const agent = agentKey ? AGENTS[agentKey] : null;
  const phases = agent ? (jt==="buyer" ? makeBuyerPhases(agent) : makeSellerPhases(agent)) : [];
  const phase = jt==="buyer" ? bPhase : sPhase;
  const setPhase = jt==="buyer" ? setBPhase : setSPhase;
  const curMsgs = msgs?.[jt] || [];
  const quickQs = jt==="buyer" ? BUYER_QS : SELLER_QS;
  const tabs = [{id:"roadmap",label:"Roadmap",e:"🗺️"},...(jt==="seller"?[{id:"packages",label:"Packages",e:"💼"}]:[]),{id:"ask",label:"Ask TMG",e:"💬"},{id:"contacts",label:"Contacts",e:"📋"}];

  const selectAgent = (key) => {
    setAgentKey(key);
    const ag = AGENTS[key];
    const defaultContacts = makeContacts(ag);
    try { const s=localStorage.getItem(`tmg_c_${key}`); if(s) setContacts(JSON.parse(s)); else setContacts(defaultContacts); } 
    catch{ setContacts(defaultContacts); }
    setMsgs({
      buyer:[{role:"assistant",content:`Welcome! 👋 I'm the TMG assistant.\n\nI'm here to support your home buying journey with ${ag.name} and the team. We handle all coordination — inspector bookings, document delivery — so you focus on the exciting parts.\n\nWhat's on your mind?`}],
      seller:[{role:"assistant",content:`Welcome! 👋 I'm the TMG assistant.\n\nI'm here to support selling your home with ${ag.name} and the team. Check the Packages tab to see what's included at each commission level.\n\nWhat's on your mind?`}]
    });
  };

  useEffect(()=>{ if(tab==="packages"&&jt==="buyer") setTab("roadmap"); },[jt]);
  useEffect(()=>{ if(agentKey&&contacts) { try{localStorage.setItem(`tmg_c_${agentKey}`,JSON.stringify(contacts));}catch{} } },[contacts]);
  useEffect(()=>{ msgEnd.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);

  const send = async (text) => {
    if(!agent||!msgs) return;
    const msg=text||input.trim(); if(!msg||loading) return;
    setInput("");
    const updated=[...curMsgs,{role:"user",content:msg}];
    setMsgs(p=>({...p,[jt]:updated}));
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.TMG_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-iab":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,system:makePrompt(agent,jt),messages:updated.map(m=>({role:m.role,content:m.content}))})
      });
      const data=await res.json();
      const reply = data.content?.[0]?.text || `Please call ${agent.name} at ${agent.phone}.`;
      setMsgs(p=>({...p,[jt]:[...updated,{role:"assistant",content:reply}]}));
    } catch(e) {
      setMsgs(p=>({...p,[jt]:[...updated,{role:"assistant",content:`Please call ${agent.name} at ${agent.phone} or email Fadila at fadila@themccooeyegroup.ca.`}]}));
    }
    setLoading(false);
  };

  if(!agentKey) return <AgentSelect onSelect={selectAgent}/>;

  return (
    <div style={{minHeight:"100vh",background:B.offWhite,display:"flex",flexDirection:"column",maxWidth:760,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,0.1)"}}>
      <div style={{background:B.navy,position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:B.red,zIndex:2}}/>
        <img src={HEADER_IMG} alt="TMG" style={{width:"100%",display:"block",height:90,objectFit:"contain",background:B.navyDark}} onError={e=>e.target.style.display="none"}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 18px 12px"}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontFamily:"sans-serif"}}>East Hants & Halifax REALTORS®</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:B.red,fontFamily:"sans-serif",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Your Agent</div>
            <div style={{fontSize:13,color:"#fff"}}>{agent.name} · {agent.phone}</div>
            <button onClick={()=>setAgentKey(null)} style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"sans-serif",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",padding:0}}>switch agent</button>
          </div>
        </div>
        <div style={{padding:"0 18px 14px"}}>
          <div style={{display:"flex",background:"rgba(255,255,255,0.08)",borderRadius:12,padding:4,gap:4}}>
            {["buyer","seller"].map(type=>(
              <button key={type} onClick={()=>{setJt(type);setExpanded(null);}} style={{flex:1,padding:"10px 0",border:"none",borderRadius:9,cursor:"pointer",background:jt===type?"#fff":"transparent",color:jt===type?B.navy:"rgba(255,255,255,0.65)",fontFamily:"sans-serif",fontSize:14,fontWeight:700}}>
                {type==="buyer"?"🏠 I'm Buying":"🏷️ I'm Selling"}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",background:"#fff",borderBottom:`2px solid ${B.border}`}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 6px",border:"none",borderBottom:tab===t.id?`3px solid ${B.red}`:"3px solid transparent",background:tab===t.id?"#fafbfd":"#fff",color:tab===t.id?B.navy:B.muted,fontFamily:"sans-serif",fontSize:12,fontWeight:tab===t.id?700:400,cursor:"pointer"}}>
            {t.e} {t.label}
          </button>
        ))}
      </div>
      <div style={{flex:1}}>
        {tab==="roadmap"&&(
          <div style={{padding:"20px 20px 40px"}}>
            <div style={{background:B.navy,borderRadius:14,padding:"16px 18px",marginBottom:20,borderTop:`4px solid ${B.red}`}}>
              <div style={{fontSize:10,letterSpacing:3,color:"rgba(255,255,255,0.4)",fontFamily:"sans-serif",marginBottom:8}}>{jt==="buyer"?"YOUR BUYING JOURNEY — NOW":"YOUR SELLING JOURNEY — NOW"}</div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:34}}>{phases[phase-1]?.icon}</div>
                <div>
                  <div style={{fontSize:17,color:"#fff",fontWeight:"bold"}}>{phases[phase-1]?.name}</div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:4,lineHeight:1.6,fontFamily:"sans-serif"}}>{phases[phase-1]?.desc}</div>
                </div>
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",fontFamily:"sans-serif",fontSize:11,color:B.muted,marginBottom:6}}>
                <span>STEP {phase} OF {phases.length}</span><span>{Math.round((phase/phases.length)*100)}% COMPLETE</span>
              </div>
              <div style={{height:6,background:B.border,borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(phase/phases.length)*100}%`,background:`linear-gradient(90deg,${B.navyDark},${B.navy})`,borderRadius:4}}/>
              </div>
            </div>
            {phases.map((p,i)=>{
              const done=p.id<phase,active=p.id===phase,open=expanded===p.id;
              return (
                <div key={p.id} style={{display:"flex",gap:12}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:42}}>
                    <div onClick={()=>setExpanded(open?null:p.id)} style={{width:42,height:42,borderRadius:"50%",background:done?B.navy:active?"#fff":B.offWhite,border:done?`2px solid ${B.navy}`:active?`2px solid ${B.red}`:`2px solid ${B.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?16:20,cursor:"pointer",boxShadow:active?`0 0 0 4px rgba(200,16,46,0.15)`:"none",color:done?"#fff":"inherit"}}>
                      {done?"✓":p.icon}
                    </div>
                    {i<phases.length-1&&<div style={{width:2,flex:1,minHeight:16,background:done?B.navy:B.border,margin:"4px 0"}}/>}
                  </div>
                  <div onClick={()=>setExpanded(open?null:p.id)} style={{flex:1,padding:"8px 12px",marginBottom:6,borderRadius:10,cursor:"pointer",background:active?"#fff":"transparent",border:active?`1px solid ${B.red}`:"1px solid transparent"}}>
                    <div style={{fontSize:14,fontWeight:active?"bold":done?600:"normal",color:active?B.navy:done?"#3a4a6a":B.border,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      {p.name}
                      {active&&<span style={{fontSize:10,fontFamily:"sans-serif",background:B.red,color:"#fff",borderRadius:20,padding:"2px 8px"}}>NOW</span>}
                    </div>
                    {(active||open)&&(
                      <div style={{marginTop:10}}>
                        <div style={{fontSize:13,color:"#3a4a5a",lineHeight:1.7,fontFamily:"sans-serif",marginBottom:10}}>{p.desc}</div>
                        {p.whatToExpect&&<div style={{background:B.navyLight,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                          <div style={{fontSize:11,fontFamily:"sans-serif",color:B.navy,fontWeight:700,marginBottom:4}}>WHAT TO EXPECT</div>
                          <div style={{fontSize:13,color:B.navy,fontFamily:"sans-serif",lineHeight:1.6}}>{p.whatToExpect}</div>
                        </div>}
                        <div style={{fontSize:11,fontFamily:"sans-serif",color:B.muted,fontWeight:700,marginBottom:6}}>KEY TIPS</div>
                        {p.tips.map((tip,j)=><div key={j} style={{display:"flex",gap:8,fontSize:13,color:"#445",fontFamily:"sans-serif",marginBottom:5}}><span style={{color:B.red}}>›</span><span>{tip}</span></div>)}
                        {p.forms?.length>0&&<div style={{marginTop:8}}>
                          <div style={{fontSize:11,fontFamily:"sans-serif",color:B.muted,fontWeight:700,marginBottom:6}}>FORMS & DOCUMENTS</div>
                          {p.forms.map((f,j)=><div key={j} style={{display:"flex",gap:8,fontSize:12,color:B.navy,fontFamily:"sans-serif",marginBottom:4,background:"#fff",padding:"6px 10px",borderRadius:6,border:`1px solid ${B.border}`}}><span>📄</span><span>{f}</span></div>)}
                        </div>}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {tab==="packages"&&jt==="seller"&&<PackagesTab agent={agent}/>}
        {tab==="ask"&&(
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 220px)",minHeight:400}}>
            <div style={{background:jt==="buyer"?B.navyLight:B.redLight,padding:"10px 20px",borderBottom:`1px solid ${B.border}`}}>
              <div style={{fontSize:12,fontFamily:"sans-serif",color:B.navy,fontWeight:600}}>{jt==="buyer"?"🏠 Buyer Assistant":"🏷️ Seller Assistant"} — Ask me anything</div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 20px 0"}}>
              {curMsgs.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:14}}>
                  {m.role==="assistant"&&<div style={{width:32,height:32,borderRadius:"50%",background:B.navy,border:`2px solid ${B.red}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,marginRight:10,flexShrink:0,marginTop:2}}>🏡</div>}
                  <div style={{maxWidth:"78%",background:m.role==="user"?B.navy:"#fff",color:m.role==="user"?"#fff":B.text,borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"12px 16px",fontSize:14,lineHeight:1.65,fontFamily:"sans-serif",border:m.role==="assistant"?`1px solid ${B.border}`:"none",whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
              ))}
              {loading&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:B.navy,border:`2px solid ${B.red}`,display:"flex",alignItems:"center",justifyContent:"center"}}>🏡</div>
                <div style={{background:"#fff",border:`1px solid ${B.border}`,borderRadius:"18px 18px 18px 4px",padding:"14px 18px",display:"flex",gap:6}}>
                  {[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:B.navy,animation:`bounce 1.2s infinite`,animationDelay:`${j*0.2}s`}}/>)}
                </div>
              </div>}
              <div ref={msgEnd}/>
            </div>
            <div style={{padding:"8px 20px 0",overflowX:"auto"}}>
              <div style={{display:"flex",gap:8,paddingBottom:8}}>
                {quickQs.map((q,i)=><button key={i} onClick={()=>send(q)} style={{whiteSpace:"nowrap",padding:"7px 14px",borderRadius:20,border:`1px solid ${B.navy}`,background:B.navyLight,color:B.navy,fontSize:12,fontFamily:"sans-serif",cursor:"pointer",flexShrink:0}}>{q}</button>)}
              </div>
            </div>
            <div style={{padding:"8px 20px 14px",display:"flex",gap:10}}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={jt==="buyer"?"Ask anything about buying...":"Ask anything about selling..."} style={{flex:1,padding:"13px 16px",borderRadius:12,border:`1px solid ${B.border}`,fontSize:14,fontFamily:"sans-serif",outline:"none"}}/>
              <button onClick={()=>send()} disabled={loading||!input.trim()} style={{padding:"13px 18px",borderRadius:12,border:"none",background:loading||!input.trim()?B.border:B.navy,color:"#fff",fontSize:18,cursor:"pointer"}}>➤</button>
            </div>
          </div>
        )}
        {tab==="contacts"&&contacts&&(
          <div style={{padding:"20px 20px 40px"}}>
            <div style={{fontSize:10,letterSpacing:3,color:B.muted,fontFamily:"sans-serif",marginBottom:16}}>YOUR TRUSTED TEAM</div>
            {contacts.map((c,i)=>(
              <div key={c.id} style={{background:"#fff",borderRadius:14,padding:"16px 18px",marginBottom:10,border:`1px solid ${B.border}`,borderLeft:i<3?`4px solid ${B.red}`:`1px solid ${B.border}`}}>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:i<3?B.navy:B.offWhite,border:i<3?`2px solid ${B.red}`:`1px solid ${B.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{c.icon}</div>
                  <div>
                    <div style={{fontSize:10,fontFamily:"sans-serif",color:B.red,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{c.role}</div>
                    <div style={{fontSize:15,fontWeight:"bold",color:B.navy}}>{c.name}</div>
                    {c.org&&<div style={{fontSize:12,color:B.muted,fontFamily:"sans-serif",marginTop:1}}>{c.org}</div>}
                  </div>
                </div>
                {c.note&&<div style={{marginTop:8,padding:"7px 12px",background:B.offWhite,borderRadius:8,fontSize:12,color:"#6a5a3a",fontFamily:"sans-serif",fontStyle:"italic"}}>💡 {c.note}</div>}
                {(c.phone||c.email)&&<div style={{display:"flex",gap:8,marginTop:10}}>
                  {c.phone&&<a href={`tel:${c.phone}`} style={{flex:1,padding:"9px",borderRadius:9,background:i<3?B.navy:B.offWhite,color:i<3?"#fff":B.navy,textAlign:"center",fontFamily:"sans-serif",fontSize:13,fontWeight:600,textDecoration:"none",display:"block"}}>📞 {c.phone}</a>}
                  {c.email&&<a href={`mailto:${c.email}`} style={{flex:1,padding:"9px",borderRadius:9,background:B.offWhite,color:B.navy,textAlign:"center",fontFamily:"sans-serif",fontSize:13,fontWeight:600,textDecoration:"none",display:"block",border:`1px solid ${B.border}`}}>✉️ Email</a>}
                </div>}
              </div>
            ))}
            <div style={{marginTop:12,padding:"14px 18px",background:B.navy,borderRadius:14,fontFamily:"sans-serif",fontSize:13,color:"rgba(255,255,255,0.65)",textAlign:"center",lineHeight:1.6}}>
              🏡 <strong style={{color:"#fff"}}>When in doubt, call {agent.name} first.</strong><br/>For admin & bookings — contact Fadila at fadila@themccooeyegroup.ca
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
